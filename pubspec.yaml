name: launchpad_flutter_app
description: "LaunchPad – a mobile matching platform connecting founders, developers, and designers."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.4
  firebase_storage: ^11.6.6
  flutter_card_swiper: ^6.0.0
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.4
  intl: ^0.19.0
  google_fonts: ^6.1.0
  confetti: ^0.7.0
  shimmer: ^3.0.0
  shared_preferences: ^2.2.0
  iconsax: ^0.0.8
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/data/
